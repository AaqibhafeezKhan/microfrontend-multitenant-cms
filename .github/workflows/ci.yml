name: CI

on:
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  ci:
    name: Lint, Type-check, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm turbo run type-check

      - name: Lint
        run: pnpm turbo run lint

      - name: Build all packages
        run: pnpm turbo run build
        env:
          EDITORIAL_REMOTE_URL: http://localhost:3001/remoteEntry.js
          MEDIA_REMOTE_URL: http://localhost:3002/remoteEntry.js
          AUTH_REMOTE_URL: http://localhost:3003/remoteEntry.js
          COLLAB_REMOTE_URL: http://localhost:3004/remoteEntry.js
          ANALYTICS_REMOTE_URL: http://localhost:3005/remoteEntry.js
          SETTINGS_REMOTE_URL: http://localhost:3006/remoteEntry.js
