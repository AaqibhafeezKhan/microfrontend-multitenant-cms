[build]
  command   = "pnpm install && pnpm turbo run build --filter=@cms/shell"
  publish   = "apps/shell/dist"
  base      = "."

[build.environment]
  NODE_VERSION         = "20.11.0"
  PNPM_VERSION         = "9.1.0"
  EDITORIAL_REMOTE_URL = "https://editorial-cms.netlify.app/remoteEntry.js"
  MEDIA_REMOTE_URL     = "https://media-cms.netlify.app/remoteEntry.js"
  AUTH_REMOTE_URL      = "https://auth-cms.netlify.app/remoteEntry.js"
  COLLAB_REMOTE_URL    = "https://collab-cms.netlify.app/remoteEntry.js"
  ANALYTICS_REMOTE_URL = "https://analytics-cms.netlify.app/remoteEntry.js"
  SETTINGS_REMOTE_URL  = "https://settings-cms.netlify.app/remoteEntry.js"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
